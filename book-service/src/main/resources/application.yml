server:
  port: 8082

spring:
  application:
    name: book-service

  datasource:
    url: jdbc:mysql://localhost:3307/book_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 600000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: book-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://rebook-eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  aws:
    bucket-name: ${APP_AWS_BUCKET_NAME:}
    region: ${APP_AWS_REGION:us-east-1}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.rebook.book: DEBUG
