server.port=8086

spring.datasource.url=jdbc:postgresql://rag-postgres:5432/ragdb?autocommit=false
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://eureka-server:8761/eureka/}
eureka.client.healthcheck.enabled=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=${EUREKA_INSTANCE_IP:}
eureka.instance.hostname=${EUREKA_INSTANCE_IP:}
eureka.instance.non-secure-port=${server.port}
eureka.instance.instance-id=${spring.application.name}:${EUREKA_INSTANCE_IP:${HOSTNAME}}:${server.port}
eureka.instance.initial-status=UP
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:http://host.docker.internal:11434}
spring.ai.ollama.embedding.model=${SPRING_AI_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
spring.ai.ollama.chat.model=${SPRING_AI_OLLAMA_CHAT_MODEL:llama3:8b}

# Colab/fallback routing disabled: use a single Ollama endpoint on the RAG instance.
app.ollama.primary-base-url=
app.ollama.fallback-base-url=${APP_OLLAMA_BASE_URL:${SPRING_AI_OLLAMA_BASE_URL:http://host.docker.internal:11434}}
app.ollama.enable-fallback=false
app.ollama.chat-model=${APP_OLLAMA_CHAT_MODEL:${SPRING_AI_OLLAMA_CHAT_MODEL:llama3:8b}}
app.ollama.embedding-model=${APP_OLLAMA_EMBEDDING_MODEL:${SPRING_AI_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}}
app.ollama.request-timeout-seconds=${APP_OLLAMA_REQUEST_TIMEOUT_SECONDS:180}