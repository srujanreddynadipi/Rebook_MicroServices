# Spring Application Configuration
spring.application.name=rag-service

# Server Configuration
server.port=8086

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5544/ragdb?autocommit=false
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# JWT Configuration
jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# AI Provider Configuration
ai.provider=ollama

# OpenAI Configuration (optional)
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openai.embedding-model=text-embedding-ada-002
ai.openai.chat-model=gpt-3.5-turbo
ai.openai.temperature=0.7
ai.openai.max-tokens=1000

# Ollama Configuration (PRIMARY) - Optimized for Speed
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.chat.model=llama3:8b
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=150
spring.ai.ollama.chat.options.top-k=20
spring.ai.ollama.chat.options.top-p=0.85
spring.ai.ollama.chat.options.num-ctx=2048

# Ollama routing (primary + fallback)
# Colab/fallback routing disabled: use one Ollama endpoint.
app.ollama.primary-base-url=
app.ollama.fallback-base-url=${APP_OLLAMA_BASE_URL:${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}}
app.ollama.enable-fallback=false
app.ollama.chat-model=${APP_OLLAMA_CHAT_MODEL:${SPRING_AI_OLLAMA_CHAT_MODEL:llama3:8b}}
app.ollama.embedding-model=${APP_OLLAMA_EMBEDDING_MODEL:${SPRING_AI_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}}
app.ollama.request-timeout-seconds=${APP_OLLAMA_REQUEST_TIMEOUT_SECONDS:180}

# RAG Configuration - Optimized for Speed
rag.system-prompt=You are a helpful AI assistant. Answer questions based on the provided context from documents. Use the context to provide accurate, detailed answers. If the context doesn't contain enough information to fully answer the question, provide what information is available and mention what's missing.
rag.max-context-length=2000

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.root=WARN
logging.level.com.example.rag=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration (handled in SecurityConfig)
# Additional CORS settings if needed

# Actuator Endpoints (Optional)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true