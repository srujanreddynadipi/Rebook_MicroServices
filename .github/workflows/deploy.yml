# ============================================================
# ReBook System — CI/CD Pipeline
# Triggered on push to main branch
#
# Required GitHub Secrets:
#   DOCKER_USERNAME        — Docker Hub username
#   DOCKER_PASSWORD        — Docker Hub password / access token
#   EC2_HOST               — MAIN stack EC2 public IP or hostname
#   EC2_USERNAME           — MAIN stack EC2 SSH username (e.g. ubuntu, ec2-user)
#   EC2_SSH_KEY            — MAIN stack EC2 private SSH key (PEM contents)
#   RAG_EC2_HOST           — RAG-only EC2 public IP or hostname
#   RAG_EC2_USERNAME       — RAG-only EC2 SSH username
#   RAG_EC2_SSH_KEY        — RAG-only EC2 private SSH key (PEM contents)
#   EUREKA_DEFAULT_ZONE    — Main Eureka URL reachable from RAG instance (e.g. http://<main-private-ip>:8761/eureka/)
#   JWT_SECRET             — JWT signing secret
#   AWS_ACCESS_KEY_ID      — AWS access key (S3 / SES)
#   AWS_SECRET_ACCESS_KEY  — AWS secret key
#   APP_AWS_BUCKET_NAME    — S3 bucket name for book covers
#   APP_AWS_REGION         — AWS region (e.g. us-east-1)
#   MAIL_USERNAME          — SMTP / SES sender address
#   MAIL_PASSWORD          — SMTP / SES password
#   APP_OLLAMA_BASE_URL           — Ollama base URL on RAG instance (e.g. http://host.docker.internal:11434)
#   APP_OLLAMA_CHAT_MODEL         — Chat model name (e.g. gemma:2b)
#   APP_OLLAMA_EMBEDDING_MODEL    — Embedding model name (e.g. nomic-embed-text)
#   APP_OLLAMA_REQUEST_TIMEOUT_SECONDS — timeout in seconds
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Test all services
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Java microservices ──────────────────────

      - name: Build and test auth-service
        run: cd auth-service && mvn clean test -B

      - name: Build and test book-service
        run: cd book-service && mvn clean test -B

      - name: Build and test request-service
        run: cd request-service && mvn clean test -B

      - name: Build and test chat-service
        run: cd chat-service && mvn clean test -B

      - name: Build and test notification-service
        run: cd notification-service && mvn clean test -B

      - name: Build and test api-gateway
        run: cd api-gateway && mvn clean test -B

      # ── React frontend ──────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: cd frontend && npm ci && npm run build

  # ──────────────────────────────────────────────
  # Job 2: Build & Push Docker images (parallel via matrix)
  # ──────────────────────────────────────────────
  build-and-push-docker:
    name: Build and Push Docker — ${{ matrix.service }}
    needs: build-and-test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: book-service
            context: ./book-service
          - service: request-service
            context: ./request-service
          - service: chat-service
            context: ./chat-service
          - service: notification-service
            context: ./notification-service
          - service: api-gateway
            context: ./api-gateway
          - service: eureka-server
            context: ./eureka-server
          - service: frontend
            context: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rebook-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/rebook-${{ matrix.service }}:${{ github.sha }}
          # Layer caching scoped per service to avoid cross-contamination
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────
  # Job 3: Deploy main stack (excluding rag-service) to MAIN EC2
  # ──────────────────────────────────────────────
  deploy-main-to-ec2:
    name: Deploy Main Stack to EC2
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Preflight check - main EC2 SSH reachability
        run: |
          set -e
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "ERROR: EC2_HOST secret is empty"
            exit 1
          fi

          echo "Checking TCP connectivity to ${{ secrets.EC2_HOST }}:22"
          if ! timeout 15 bash -c "</dev/tcp/${{ secrets.EC2_HOST }}/22"; then
            echo "ERROR: Cannot reach ${{ secrets.EC2_HOST }}:22 from GitHub runner."
            echo "Check EC2 public IP/hostname, instance state, security group inbound 22, NACL, route table, and any corporate/VPC firewall rules."
            exit 1
          fi

      - name: SSH into main EC2 and deploy (no rag-service)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d "$HOME/rebook-system/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/rebook-system"
            fi

            cd ~/rebook-system

            if [ -z "${{ secrets.APP_JWT_SECRET }}" ]; then
              echo "ERROR: APP_JWT_SECRET must be set in GitHub Secrets"
              exit 1
            fi

            echo "==> Writing .env from GitHub secrets..."
            cat > .env << EOF
            APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
            MYSQL_ROOT_PASSWORD=root
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            APP_AWS_BUCKET_NAME=${{ secrets.APP_AWS_BUCKET_NAME }}
            APP_AWS_REGION=${{ secrets.APP_AWS_REGION }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            APP_OLLAMA_BASE_URL=${{ secrets.APP_OLLAMA_BASE_URL }}
            APP_OLLAMA_CHAT_MODEL=${{ secrets.APP_OLLAMA_CHAT_MODEL }}
            APP_OLLAMA_EMBEDDING_MODEL=${{ secrets.APP_OLLAMA_EMBEDDING_MODEL }}
            APP_OLLAMA_REQUEST_TIMEOUT_SECONDS=${{ secrets.APP_OLLAMA_REQUEST_TIMEOUT_SECONDS }}
            EOF

            echo "==> Lightweight cleanup (preserve image cache)..."
            docker image prune -f
            docker builder prune -f --filter "until=24h" || true
            sudo journalctl --vacuum-size=100M
            df -h

            echo "==> Pulling latest code..."
            git pull origin main

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            echo "==> Pulling latest Docker images..."
            $COMPOSE pull

            echo "==> Ensuring rag services are not running on main instance..."
            echo "RAG services removed in this branch; skipping rag stop/remove"

            echo "==> Restarting main services (excluding rag)..."
            $COMPOSE up -d --remove-orphans \
              mysql redis zookeeper kafka kafka-ui eureka-server \
              api-gateway auth-service book-service request-service \
              chat-service notification-service frontend tts

            echo "==> Status:"
            $COMPOSE ps

            echo "Deployment complete"

  # ──────────────────────────────────────────────
  # RAG deployment job removed in this learning branch
