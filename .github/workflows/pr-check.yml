# ============================================================
# ReBook System — PR Check
# Triggered on pull_request to main or develop
#
# All checks must pass before a PR can be merged.
# Configure these as required status checks in:
#   GitHub → Settings → Branches → Branch protection rules
#
# Required status checks to protect main/develop:
#   • build-and-test / Build and test auth-service
#   • build-and-test / Build and test book-service
#   • build-and-test / Build and test request-service
#   • build-and-test / Build and test chat-service
#   • build-and-test / Build and test notification-service
#   • build-and-test / Build and test rag-service
#   • build-and-test / Build and test api-gateway
#   • build-and-test / Build React frontend
# ============================================================

name: PR Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  # ──────────────────────────────────────────────
  # Build & Test — required to pass before merge
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Java microservices ──────────────────────

      - name: Build and test auth-service
        run: cd auth-service && mvn clean test -B

      - name: Build and test book-service
        run: cd book-service && mvn clean test -B

      - name: Build and test request-service
        run: cd request-service && mvn clean test -B

      - name: Build and test chat-service
        run: cd chat-service && mvn clean test -B

      - name: Build and test notification-service
        run: cd notification-service && mvn clean test -B

      - name: Build and test rag-service
        if: ${{ hashFiles('rag-service/pom.xml') != '' }}
        run: cd rag-service && mvn clean test -B

      - name: Build and test api-gateway
        run: cd api-gateway && mvn clean test -B

      # ── React frontend ──────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: cd frontend && npm ci && npm run build
