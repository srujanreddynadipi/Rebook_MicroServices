apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rebook-ingress
  namespace: rebook
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: rebook.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
