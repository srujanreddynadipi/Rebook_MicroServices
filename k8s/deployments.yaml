# Generic deployments for microservices (replace image tags as needed)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rebook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: DOCKER_USERNAME/rebook-api-gateway:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: rebook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: DOCKER_USERNAME/rebook-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20

# Additional service deployments (auth-service, book-service, chat-service, request-service, notification-service, eureka-server)
# Copy one of the above blocks and change name/image/ports as required.
